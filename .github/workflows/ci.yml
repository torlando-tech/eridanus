name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  r8-verification:
    name: Verify R8 Keep Rules
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace --max-workers=2

      - name: Verify critical classes survive R8 minification
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No release APK found!"
            exit 1
          fi
          python scripts/verify_r8_keeps.py "$APK_PATH"

      - name: Upload R8 mapping file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

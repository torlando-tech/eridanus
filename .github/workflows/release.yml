name: Tagged Release/Prerelease

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Reticulum submodule (eridanus-rns-backend-py/Reticulum) — needed
          # for the python flavor's chaquopy build.
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle wrapper distribution
        # setup-gradle@v5 caches deps but not ~/.gradle/wrapper/dists. On a
        # cache miss the wrapper bootstrap downloads from services.gradle.org
        # with a short network timeout, which crashes the run when the CDN
        # has a hiccup. See ci.yml for the long-form rationale.
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/dists
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-wrapper-${{ runner.os }}-

      - name: Setup Gradle
        # Pinned to v5, not v6: gradle/actions@v6 extracts caching into a
        # separate proprietary `gradle-actions-caching` component governed
        # by Gradle's commercial Terms of Use (loaded whenever caching is
        # enabled, which it is here). v5 stays fully MIT and already runs
        # on Node 24, which is all we need for the deprecation.
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION from tag: $TAG_NAME"

      - name: Set up Python
        # Build-machine python for chaquopy's gradle tasks. The python
        # bundled into the python-flavor APK is downloaded separately by
        # chaquopy (3.12) and is independent of this.
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build both flavor release APKs
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # assembleRelease fans out to assembleKotlinRelease +
          # assemblePythonRelease via the rnsImpl flavor dimension. Both
          # inherit the `release` build type's signing config, so both are
          # signed with the same keystore — provided the KEYSTORE_* secrets
          # above are present. The next step hard-verifies that.
          ./gradlew :app:assembleRelease --no-daemon --stacktrace
          echo "Both flavor release APKs built successfully"

      - name: Verify both flavor APKs are release-signed
        # Hard gate: a tagged release must be signed with the real release
        # keystore — never unsigned, never debug-signed. The release build
        # type falls back to debug signing when the KEYSTORE_* secrets are
        # absent (so PR-CI artifacts stay installable), which means a
        # missing/unreadable secret here would silently produce a
        # *debug-signed* "release" that still passes `apksigner verify`.
        # So this gate checks the signer certificate, not just signature
        # validity: the Android debug cert's well-known DN
        # (CN=Android Debug, O=Android, C=US) is rejected outright.
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using $APKSIGNER"
          FAIL=0
          for flavor in kotlin python; do
            APK=$(find "app/build/outputs/apk/$flavor/release" -name "*.apk" | head -1)
            if [ -z "$APK" ]; then
              echo "::error::No $flavor-flavor release APK found"
              FAIL=1
              continue
            fi
            case "$APK" in
              *-unsigned.apk)
                echo "::error::$flavor APK is unsigned ($APK) — release signing secrets not applied"
                FAIL=1
                continue
                ;;
            esac
            CERTS=$("$APKSIGNER" verify --print-certs --verbose "$APK" 2>&1) || {
              echo "::error::$flavor APK failed signature verification ($APK)"
              echo "$CERTS"
              FAIL=1
              continue
            }
            if echo "$CERTS" | grep -q "CN=Android Debug"; then
              echo "::error::$flavor APK is DEBUG-signed ($APK) — release keystore secrets not applied"
              FAIL=1
              continue
            fi
            echo "OK: $flavor APK is release-signed ($APK)"
          done
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Verify critical classes survive R8 (kotlin flavor)
        # verify_r8_keeps.py's keep-list is reticulum-kt / BouncyCastle /
        # msgpack specific — kotlin flavor only. The python flavor has its
        # own bridge check below.
        run: |
          APK_PATH=$(find app/build/outputs/apk/kotlin/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No kotlin-flavor release APK found!"
            exit 1
          fi
          python scripts/verify_r8_keeps.py "$APK_PATH"

      - name: Verify python-kotlin bridge survives R8 (python flavor)
        # Same gate as ci.yml — guards against R8 renaming the Py*Callback
        # classes/`call` method that event_bridge.py calls reflectively.
        # Without this, a release could ship with announces silently failing
        # on every received-announce callback (debug builds are unaffected
        # since they aren't minified, which masks the regression).
        run: |
          MAPPING=app/build/outputs/mapping/pythonRelease/mapping.txt
          if [ ! -f "$MAPPING" ]; then
            echo "::error::python-flavor R8 mapping not found at $MAPPING"
            exit 1
          fi
          python scripts/verify_python_bridge.py "$MAPPING"

      - name: Extract signing certificate fingerprints
        id: cert
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # Both flavors are signed with the same keystore, so one
          # fingerprint extraction covers both APKs.
          CERT_INFO=$(keytool -list -v -keystore app/build/keystore/release.keystore \
            -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD")
          SHA256=$(echo "$CERT_INFO" | grep "SHA256:" | awk '{print $2}')
          SHA1=$(echo "$CERT_INFO" | grep "SHA1:" | awk '{print $2}')
          if [ -z "$SHA256" ] || [ -z "$SHA1" ]; then
            echo "::error::Failed to extract certificate fingerprints"
            exit 1
          fi
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          echo "Extracted certificate fingerprints"

      - name: Collect + rename flavor APKs
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Two equal-billing release artifacts, one per rnsImpl flavor.
          KOTLIN_APK=$(find app/build/outputs/apk/kotlin/release -name "*.apk" | head -1)
          PYTHON_APK=$(find app/build/outputs/apk/python/release -name "*.apk" | head -1)
          if [ -z "$KOTLIN_APK" ] || [ -z "$PYTHON_APK" ]; then
            echo "::error::Missing a flavor APK (kotlin='$KOTLIN_APK' python='$PYTHON_APK')"
            exit 1
          fi
          cp "$KOTLIN_APK" "eridanus-kotlin-${VERSION}.apk"
          cp "$PYTHON_APK" "eridanus-python-${VERSION}.apk"
          ls -la eridanus-*.apk
          echo "Renamed both flavor APKs"

      - name: Generate SHA256 checksums
        run: |
          for apk in eridanus-*.apk; do
            sha256sum "$apk" > "${apk}.sha256"
          done
          echo "Generated SHA256 checksums"

      - name: Read SHA256 checksums
        id: sha256
        run: |
          CHECKSUMS=""
          for checksum_file in eridanus-*.apk.sha256; do
            CHECKSUMS="${CHECKSUMS}$(cat "$checksum_file")\n"
          done
          echo "checksums<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHECKSUMS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            eridanus-*.apk
            eridanus-*.apk.sha256
          draft: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## Eridanus ${{ steps.version.outputs.version }}

            ### Which APK?

            Eridanus ships two flavors, one running the official Reticulum reference implementation, 
            and another running an unfinished, experimental, mostly AI-generated port of Reticulum to kotlin. 
            Both aspire to behave identically and both
            attach to a shared Reticulum instance on your device ([Sideband](https://github.com/markqvist/Sideband),
            rnsd in Termux, [Reticulum-for-Android](https://github.com/torlando-tech/reticulum-android)). The only
            _intended_ difference is *which Reticulum implementation runs in-process*:

            | APK | Reticulum implementation | Size |
            |-----|--------------------------|------|
            | **eridanus-python-${{ steps.version.outputs.version }}.apk** | upstream python Reticulum, embedded via chaquopy — the reference implementation | larger (bundles a Python runtime) |
            | **eridanus-kotlin-${{ steps.version.outputs.version }}.apk** | reticulum-kt (experimental kotlin port, WIP, AI-Generated) | smaller |

            The Python version is highly recommended, unless you are willing to experiment and are open to the risks of missing or broken behavior at the cryptography layers,
            and really need the smaller APK.
            ### Installation
            Download one APK and install on your Android device (Android 8.0+).

            ### Verification

            **Signing Certificate Fingerprints** (both APKs, same keystore):
            ```
            SHA-256: ${{ steps.cert.outputs.sha256 }}
            SHA-1:   ${{ steps.cert.outputs.sha1 }}
            ```

            **SHA256 Checksums:**
            ```
            ${{ steps.sha256.outputs.checksums }}
            ```

            ### What's Changed
            See the release notes below for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: eridanus-${{ steps.version.outputs.version }}-apks
          path: eridanus-*.apk
          retention-days: 30
